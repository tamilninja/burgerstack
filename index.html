<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Burger Stack!</title>
<script src="https://www.youtube.com/game_api/v1" async></script>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: #1a0f08;
    touch-action: none; -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
"use strict";

/* ============================================================
   YouTube Playables SDK wrapper (safe outside the YT env too)
   ============================================================ */
const YT = {
  get sdk() { return (typeof ytgame !== "undefined") ? ytgame : null; },
  get inEnv() { return !!(this.sdk && this.sdk.IN_PLAYABLES_ENV); },
  firstFrameSent: false,
  readySent: false,

  firstFrame() {
    if (this.firstFrameSent) return;
    try { if (this.inEnv) this.sdk.game.firstFrameReady(); this.firstFrameSent = true; }
    catch (e) {}
  },
  ready() {
    if (this.readySent) return;
    try { if (this.inEnv) this.sdk.game.gameReady(); this.readySent = true; }
    catch (e) {}
  },
  sendScore(v) {
    try { if (this.inEnv) this.sdk.engagement.sendScore({ value: Math.max(0, Math.floor(v)) }); }
    catch (e) {}
  },
  async save(obj) {
    const str = JSON.stringify(obj);
    if (this.inEnv) { try { await this.sdk.game.saveData(str); } catch (e) {} }
    try { localStorage.setItem("burgerstack_save", str); } catch (e) {}
  },
  async load() {
    if (this.inEnv) {
      try { const s = await this.sdk.game.loadData(); if (s) return JSON.parse(s); } catch (e) {}
    }
    try { const s = localStorage.getItem("burgerstack_save"); if (s) return JSON.parse(s); } catch (e) {}
    return null;
  },
  initSystemHooks() {
    if (!this.inEnv) return;
    try {
      audio.enabled = this.sdk.system.isAudioEnabled();
      this.sdk.system.onAudioEnabledChange(v => { audio.enabled = v; });
      this.sdk.system.onPause(() => { paused = true; });
      this.sdk.system.onResume(() => { paused = false; lastT = performance.now(); });
    } catch (e) {}
  }
};

// The SDK script is async; poll briefly so hooks attach once it arrives.
(function waitSdk(n) {
  if (YT.sdk) { YT.initSystemHooks(); return; }
  if (n < 50) setTimeout(() => waitSdk(n + 1), 100);
})(0);

/* ============================================================
   Audio — tiny WebAudio synth, no asset files
   ============================================================ */
const audio = {
  ctx: null, enabled: true,
  ensure() {
    if (!this.ctx) {
      try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (this.ctx && this.ctx.state === "suspended") this.ctx.resume();
  },
  tone(freq, dur, type, vol, slide) {
    if (!this.ctx || !this.enabled) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type || "sine";
    o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), t + dur);
    g.gain.setValueAtTime(vol || 0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t + dur + 0.02);
  },
  noise(dur, vol) {
    if (!this.ctx || !this.enabled) return;
    const t = this.ctx.currentTime;
    const len = Math.floor(this.ctx.sampleRate * dur);
    const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const g = this.ctx.createGain(); g.gain.value = vol || 0.12;
    src.connect(g); g.connect(this.ctx.destination); src.start(t);
  },
  drop()      { this.tone(140, 0.12, "sine", 0.25, -60); this.noise(0.05, 0.06); },
  slice()     { this.noise(0.12, 0.14); this.tone(300, 0.08, "sawtooth", 0.05, -150); },
  perfect(c)  { const f = 520 * Math.pow(1.12, Math.min(c, 12)); this.tone(f, 0.14, "triangle", 0.2, 60); this.tone(f * 1.5, 0.2, "sine", 0.1, 40); },
  cash()      { this.tone(880, 0.07, "square", 0.05); this.tone(1320, 0.12, "square", 0.05); },
  gameOver()  { this.tone(320, 0.25, "sawtooth", 0.12, -180); setTimeout(() => this.tone(180, 0.4, "sawtooth", 0.12, -100), 180); },
  start()     { this.tone(440, 0.1, "triangle", 0.15, 100); setTimeout(() => this.tone(660, 0.15, "triangle", 0.15, 120), 100); }
};

/* ============================================================
   Canvas setup
   ============================================================ */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let W = 0, H = 0, S = 1; // css size + ui scale

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  S = Math.max(0.7, Math.min(1.4, Math.min(W, 560) / 480));
}
window.addEventListener("resize", resize);
resize();

/* ============================================================
   Game constants + state
   ============================================================ */
const TYPES = ["patty", "cheese", "lettuce", "tomato", "onion", "bacon"];
const COLORS = {
  patty:   { main: "#8a4a26", dark: "#6d3517", light: "#a2603a" },
  cheese:  { main: "#ffc933", dark: "#eda412", light: "#ffe07a" },
  lettuce: { main: "#7ac74f", dark: "#57a331", light: "#a4e07f" },
  tomato:  { main: "#e63f2e", dark: "#b82418", light: "#ff7a5c" },
  onion:   { main: "#e8d5f0", dark: "#b48cc7", light: "#f7ecfb" },
  bacon:   { main: "#b3402e", dark: "#8c2a1c", light: "#e8a48e" },
  bun:     { main: "#e8a33d", dark: "#c77f1f", light: "#f7c979" }
};

let state = "title";          // title | play | dying | over
let paused = false;
let layers = [];              // {x, w, type}
let piece = null;             // moving piece {x, w, type, dir, speed}
let falling = [];             // cut-off chunks
let particles = [];
let floaters = [];            // floating texts
let score = 0, money = 0, combo = 0, best = 0, bestMoney = 0;
let camY = 0, camTarget = 0;
let shake = 0, dieTimer = 0, titleBounce = 0;
let lastT = performance.now();

const LAYER_H = () => 34 * S;
const BASE_W  = () => Math.min(W * 0.55, 300);
const PERFECT_PX = 9;

YT.load().then(d => {
  if (d) { best = d.best || 0; bestMoney = d.bestMoney || 0; }
});

function resetGame() {
  layers = [{ x: W / 2 - BASE_W() / 2, w: BASE_W(), type: "bunBottom" }];
  falling = []; particles = []; floaters = [];
  score = 0; money = 0; combo = 0;
  camY = 0; camTarget = 0; shake = 0;
  spawnPiece();
}

function spawnPiece() {
  const prev = layers[layers.length - 1];
  const type = TYPES[(layers.length - 1) % TYPES.length];
  const speed = Math.min(200 + layers.length * 13, 620) * S;
  const fromLeft = layers.length % 2 === 1;
  piece = {
    w: prev.w,
    x: fromLeft ? boundL() : boundR() - prev.w,
    dir: fromLeft ? 1 : -1,
    speed, type
  };
}

function boundL() { return Math.max(16, W / 2 - Math.min(W * 0.46, 340)); }
function boundR() { return Math.min(W - 16, W / 2 + Math.min(W * 0.46, 340)); }

/* ============================================================
   Input
   ============================================================ */
function tap() {
  audio.ensure();
  if (state === "title") {
    audio.start(); resetGame(); state = "play";
  } else if (state === "play") {
    dropPiece();
  } else if (state === "over") {
    audio.start(); resetGame(); state = "play";
  }
}
window.addEventListener("pointerdown", e => { e.preventDefault(); tap(); }, { passive: false });
window.addEventListener("keydown", e => { if (e.code === "Space" || e.code === "Enter") tap(); });

/* ============================================================
   Core mechanic
   ============================================================ */
function dropPiece() {
  const below = layers[layers.length - 1];
  const delta = piece.x - below.x;
  const overlap = Math.min(piece.x + piece.w, below.x + below.w) - Math.max(piece.x, below.x);

  if (overlap <= 4) {
    // Total miss — the piece tumbles off, game over.
    falling.push({ x: piece.x, y: topY() - LAYER_H(), w: piece.w, type: piece.type, vy: -140 * S, vx: piece.dir * 120 * S, rot: 0, vr: piece.dir * 3 });
    piece = null;
    audio.gameOver();
    shake = 14;
    state = "dying"; dieTimer = 0;
    return;
  }

  const perfect = Math.abs(delta) <= PERFECT_PX * S;
  let nx, nw;
  if (perfect) {
    nx = below.x; nw = Math.min(below.w + 7 * S, BASE_W());   // reward: regrow
    combo++;
    audio.perfect(combo);
    addFloater(combo > 1 ? "PERFECT x" + combo : "PERFECT!", W / 2, topY() - 70 * S, "#ffe07a");
    burst(below.x + below.w / 2, topY() - LAYER_H() / 2, "#ffe07a", 18);
  } else {
    combo = 0;
    nx = Math.max(piece.x, below.x);
    nw = overlap;
    // slice off the overhang
    const cutW = piece.w - overlap;
    const cutX = delta > 0 ? below.x + below.w : piece.x;
    falling.push({ x: cutX, y: topY() - LAYER_H(), w: cutW, type: piece.type, vy: -60 * S, vx: (delta > 0 ? 1 : -1) * 90 * S, rot: 0, vr: (delta > 0 ? 1 : -1) * 2.2 });
    audio.slice();
    burst(cutX + cutW / 2, topY() - LAYER_H() / 2, COLORS[piece.type].main, 10);
  }

  layers.push({ x: nx, w: nw, type: piece.type });
  score++;
  const earned = 2 * Math.max(1, combo);
  money += earned;
  if (combo >= 2) audio.cash();
  audio.drop();
  shake = Math.max(shake, 4);
  camTarget = Math.max(0, layers.length * LAYER_H() - H * 0.42);
  spawnPiece();
}

function topY() {
  // screen Y of the top surface of the stack
  return H - 90 * S - (layers.length - 1) * LAYER_H() + camY;
}

/* ============================================================
   FX helpers
   ============================================================ */
function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = (60 + Math.random() * 180) * S;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60 * S, r: (2 + Math.random() * 3.5) * S, color, life: 0.7 + Math.random() * 0.4, t: 0 });
  }
}
function addFloater(text, x, y, color) {
  floaters.push({ text, x, y, color, t: 0 });
}

/* ============================================================
   Update
   ============================================================ */
function update(dt) {
  titleBounce += dt;
  camY += (camTarget - camY) * Math.min(1, dt * 6);
  if (shake > 0) shake = Math.max(0, shake - dt * 40);

  if (state === "play" && piece) {
    piece.x += piece.dir * piece.speed * dt;
    if (piece.x <= boundL()) { piece.x = boundL(); piece.dir = 1; }
    if (piece.x + piece.w >= boundR()) { piece.x = boundR() - piece.w; piece.dir = -1; }
  }

  if (state === "dying") {
    dieTimer += dt;
    if (dieTimer > 1.1) {
      state = "over";
      const isBest = score > best;
      if (isBest) best = score;
      if (money > bestMoney) bestMoney = money;
      YT.save({ best, bestMoney });
      YT.sendScore(score);
    }
  }

  for (const f of falling) {
    f.vy += 1500 * S * dt;
    f.x += f.vx * dt; f.y += f.vy * dt; f.rot += f.vr * dt;
  }
  falling = falling.filter(f => f.y < H + 200);

  for (const p of particles) {
    p.t += dt; p.vy += 900 * S * dt;
    p.x += p.vx * dt; p.y += p.vy * dt;
  }
  particles = particles.filter(p => p.t < p.life);

  for (const f of floaters) f.t += dt;
  floaters = floaters.filter(f => f.t < 1.1);
}

/* ============================================================
   Drawing
   ============================================================ */
function rr(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawLayer(type, x, y, w, h) {
  const c = COLORS[type] || COLORS.bun;
  if (type === "bunBottom") {
    ctx.fillStyle = COLORS.bun.main; rr(x, y, w, h, 8 * S); ctx.fill();
    ctx.fillStyle = COLORS.bun.light; rr(x, y, w, h * 0.4, 8 * S); ctx.fill();
    ctx.fillStyle = COLORS.bun.dark; ctx.fillRect(x, y + h - 4 * S, w, 4 * S);
    return;
  }
  if (type === "bunTop") {
    ctx.fillStyle = c.main;
    ctx.beginPath();
    ctx.moveTo(x, y + h);
    ctx.quadraticCurveTo(x, y - h * 0.5, x + w / 2, y - h * 0.5);
    ctx.quadraticCurveTo(x + w, y - h * 0.5, x + w, y + h);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = c.light;
    ctx.beginPath();
    ctx.moveTo(x + w * 0.08, y + h * 0.3);
    ctx.quadraticCurveTo(x + w * 0.1, y - h * 0.35, x + w / 2, y - h * 0.35);
    ctx.quadraticCurveTo(x + w * 0.75, y - h * 0.35, x + w * 0.85, y - h * 0.1);
    ctx.quadraticCurveTo(x + w * 0.6, y - h * 0.25, x + w * 0.2, y + h * 0.35);
    ctx.closePath(); ctx.fill();
    // sesame seeds
    ctx.fillStyle = "#fff3d6";
    for (let i = 0; i < 7; i++) {
      const sx = x + w * (0.15 + 0.1 * i), sy = y + h * 0.1 - Math.sin(i * 1.3) * h * 0.3;
      ctx.save(); ctx.translate(sx, sy); ctx.rotate(i * 0.7);
      ctx.beginPath(); ctx.ellipse(0, 0, 3.2 * S, 1.8 * S, 0, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    return;
  }

  switch (type) {
    case "patty":
      ctx.fillStyle = c.main; rr(x, y + h * 0.1, w, h * 0.85, 10 * S); ctx.fill();
      ctx.fillStyle = c.dark;
      for (let i = 0; i < Math.floor(w / (26 * S)); i++) {
        ctx.beginPath();
        ctx.ellipse(x + 16 * S + i * 26 * S, y + h * 0.5 + ((i % 2) ? 4 : -3) * S, 5 * S, 3 * S, 0.4, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = c.light; rr(x + 3 * S, y + h * 0.1, w - 6 * S, h * 0.2, 6 * S); ctx.fill();
      break;
    case "cheese": {
      ctx.fillStyle = c.main; rr(x, y, w, h * 0.62, 4 * S); ctx.fill();
      // drips
      ctx.fillStyle = c.main;
      const n = Math.max(2, Math.floor(w / (34 * S)));
      for (let i = 0; i < n; i++) {
        const dx = x + w * ((i + 0.5) / n);
        const dl = h * (0.55 + 0.35 * Math.abs(Math.sin(i * 2.7)));
        rr(dx - 6 * S, y + h * 0.3, 12 * S, dl, 6 * S); ctx.fill();
      }
      ctx.fillStyle = c.light; ctx.fillRect(x + 3 * S, y + 2 * S, w - 6 * S, 4 * S);
      break;
    }
    case "lettuce": {
      ctx.fillStyle = c.main;
      ctx.beginPath();
      ctx.moveTo(x, y + h * 0.35);
      const waves = Math.max(3, Math.floor(w / (22 * S)));
      for (let i = 0; i <= waves; i++) {
        const wx = x + (w / waves) * i;
        ctx.quadraticCurveTo(wx - w / waves / 2, (i % 2 ? y : y + h * 0.55), wx, y + h * 0.35);
      }
      ctx.lineTo(x + w, y + h * 0.9); ctx.lineTo(x, y + h * 0.9);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = c.light;
      ctx.fillRect(x + 2 * S, y + h * 0.42, w - 4 * S, 4 * S);
      break;
    }
    case "tomato":
      ctx.fillStyle = c.dark; rr(x, y + h * 0.15, w, h * 0.75, 8 * S); ctx.fill();
      ctx.fillStyle = c.main; rr(x + 2 * S, y + h * 0.15, w - 4 * S, h * 0.6, 8 * S); ctx.fill();
      ctx.fillStyle = c.light;
      for (let i = 0; i < Math.floor(w / (30 * S)); i++) {
        ctx.beginPath();
        ctx.arc(x + 18 * S + i * 30 * S, y + h * 0.45, 4 * S, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case "onion": {
      ctx.fillStyle = c.main; rr(x, y + h * 0.2, w, h * 0.6, 8 * S); ctx.fill();
      ctx.strokeStyle = c.dark; ctx.lineWidth = 2 * S;
      const rings = Math.max(2, Math.floor(w / (44 * S)));
      for (let i = 0; i < rings; i++) {
        ctx.beginPath();
        ctx.arc(x + w * ((i + 0.5) / rings), y + h * 0.5, 9 * S, 0, Math.PI * 2);
        ctx.stroke();
      }
      break;
    }
    case "bacon": {
      ctx.fillStyle = c.main; rr(x, y + h * 0.15, w, h * 0.65, 5 * S); ctx.fill();
      ctx.strokeStyle = c.light; ctx.lineWidth = 3 * S;
      ctx.beginPath();
      const bw = Math.max(3, Math.floor(w / (26 * S)));
      ctx.moveTo(x + 4 * S, y + h * 0.48);
      for (let i = 1; i <= bw; i++) {
        ctx.quadraticCurveTo(
          x + (w / bw) * (i - 0.5), y + h * (i % 2 ? 0.3 : 0.66),
          x + (w / bw) * i - 4 * S, y + h * 0.48
        );
      }
      ctx.stroke();
      break;
    }
  }
}

function drawBackground() {
  const lvl = Math.min(layers.length, 100);
  const hue = 210 - lvl * 1.6;
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, `hsl(${hue}, 55%, ${Math.max(12, 45 - lvl * 0.3)}%)`);
  g.addColorStop(1, `hsl(${hue + 30}, 60%, ${Math.max(20, 62 - lvl * 0.3)}%)`);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // parallax bubbles / stars
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = "#ffffff";
  for (let i = 0; i < 14; i++) {
    const px = ((i * 137 + 40) % W);
    const py = ((i * 211 + camY * (0.2 + (i % 3) * 0.12)) % (H + 80)) - 40;
    ctx.beginPath();
    ctx.arc(px, py, (3 + (i % 4) * 4) * S, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawBoard() {
  const by = H - 90 * S + camY + LAYER_H();
  if (by > H + 60) return;
  ctx.fillStyle = "#8a5a33";
  rr(W / 2 - BASE_W() / 2 - 40 * S, by - 6 * S, BASE_W() + 80 * S, 18 * S, 8 * S);
  ctx.fill();
  ctx.fillStyle = "#6d4426";
  ctx.fillRect(W / 2 - BASE_W() / 2 - 40 * S, by + 6 * S, BASE_W() + 80 * S, 6 * S);
}

function drawStack() {
  const h = LAYER_H();
  for (let i = 0; i < layers.length; i++) {
    const L = layers[i];
    const y = H - 90 * S - i * h + camY;
    if (y > H + h || y < -h * 2) continue;
    drawLayer(L.type, L.x, y - h, L.w, h);
  }
}

function drawPiece() {
  if (!piece) return;
  const h = LAYER_H();
  const y = topY() - h;
  // drop guide
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = "#000";
  ctx.fillRect(piece.x, y + h, piece.w, H);
  ctx.globalAlpha = 1;
  drawLayer(piece.type, piece.x, y - h - 6 * S, piece.w, h);
}

function drawFX() {
  for (const f of falling) {
    ctx.save();
    ctx.translate(f.x + f.w / 2, f.y + LAYER_H() / 2);
    ctx.rotate(f.rot);
    drawLayer(f.type, -f.w / 2, -LAYER_H() / 2, f.w, LAYER_H());
    ctx.restore();
  }
  for (const p of particles) {
    ctx.globalAlpha = 1 - p.t / p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  for (const f of floaters) {
    const a = 1 - f.t / 1.1;
    ctx.globalAlpha = a;
    ctx.fillStyle = f.color;
    ctx.font = `bold ${26 * S}px 'Arial Black', Arial, sans-serif`;
    ctx.textAlign = "center";
    ctx.fillText(f.text, f.x, f.y - f.t * 50 * S);
  }
  ctx.globalAlpha = 1;
}

function textOutlined(text, x, y, size, fill, align) {
  ctx.font = `bold ${size}px 'Arial Black', Arial, sans-serif`;
  ctx.textAlign = align || "center";
  ctx.lineWidth = size * 0.16;
  ctx.strokeStyle = "rgba(40,20,5,0.85)";
  ctx.strokeText(text, x, y);
  ctx.fillStyle = fill;
  ctx.fillText(text, x, y);
}

function drawHUD() {
  // score
  textOutlined(String(score), W / 2, 74 * S, 56 * S, "#ffffff");
  if (combo > 1) textOutlined("COMBO x" + combo, W / 2, 108 * S, 22 * S, "#ffe07a");
  // money pill
  ctx.fillStyle = "rgba(30,60,20,0.6)";
  rr(14 * S, 20 * S, 118 * S, 36 * S, 18 * S); ctx.fill();
  textOutlined("$" + money, 73 * S, 46 * S, 22 * S, "#9fe870");
  // best pill
  ctx.fillStyle = "rgba(60,40,10,0.6)";
  rr(W - 132 * S, 20 * S, 118 * S, 36 * S, 18 * S); ctx.fill();
  textOutlined("BEST " + best, W - 73 * S, 46 * S, 18 * S, "#ffd24a");
}

function drawTitleBurger(cx, cy, w) {
  const order = ["bunBottom", "patty", "cheese", "lettuce", "tomato", "bunTop"];
  const h = 26 * S;
  const bounce = Math.sin(titleBounce * 2.4) * 6 * S;
  for (let i = 0; i < order.length; i++) {
    const wob = Math.sin(titleBounce * 2.4 + i * 0.6) * 3 * S;
    drawLayer(order[i], cx - w / 2 + wob, cy - i * h + bounce, w, h + (order[i] === "bunTop" ? 6 * S : 0));
  }
}

function drawTitle() {
  drawTitleBurger(W / 2, H * 0.52, Math.min(W * 0.5, 260));
  textOutlined("BURGER", W / 2, H * 0.2, 62 * S, "#ffd24a");
  textOutlined("STACK!", W / 2, H * 0.2 + 62 * S, 62 * S, "#ff8a3d");
  const blink = (Math.sin(titleBounce * 4) + 1) / 2;
  ctx.globalAlpha = 0.5 + blink * 0.5;
  textOutlined("TAP TO PLAY", W / 2, H * 0.72, 30 * S, "#ffffff");
  ctx.globalAlpha = 1;
  if (best > 0) textOutlined("BEST: " + best + "   $" + bestMoney, W / 2, H * 0.8, 20 * S, "#ffe07a");
}

function drawGameOver() {
  ctx.fillStyle = "rgba(20,10,5,0.72)";
  ctx.fillRect(0, 0, W, H);
  textOutlined("ORDER UP!", W / 2, H * 0.3, 52 * S, "#ffd24a");
  textOutlined(score + " LAYERS", W / 2, H * 0.42, 40 * S, "#ffffff");
  textOutlined("EARNED  $" + money, W / 2, H * 0.5, 28 * S, "#9fe870");
  if (score >= best && score > 0) {
    const blink = (Math.sin(titleBounce * 5) + 1) / 2;
    ctx.globalAlpha = 0.6 + blink * 0.4;
    textOutlined("★ NEW BEST! ★", W / 2, H * 0.58, 26 * S, "#ff8a3d");
    ctx.globalAlpha = 1;
  } else {
    textOutlined("BEST: " + best, W / 2, H * 0.58, 22 * S, "#ffe07a");
  }
  const blink2 = (Math.sin(titleBounce * 4) + 1) / 2;
  ctx.globalAlpha = 0.5 + blink2 * 0.5;
  textOutlined("TAP TO RESTART", W / 2, H * 0.7, 26 * S, "#ffffff");
  ctx.globalAlpha = 1;
}

/* ============================================================
   Main loop
   ============================================================ */
function frame(now) {
  requestAnimationFrame(frame);
  if (paused) { lastT = now; return; }
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  update(dt);

  ctx.save();
  if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);

  drawBackground();
  if (state === "title") {
    drawTitle();
  } else {
    drawBoard();
    drawStack();
    if (state === "play") drawPiece();
    drawFX();
    drawHUD();
    if (state === "over") drawGameOver();
  }
  ctx.restore();

  // Tell YouTube we're rendering + interactive.
  YT.firstFrame();
  YT.ready();
}
requestAnimationFrame(frame);
</script>
</body>
</html>
